  # ========== 16. CI integration ==========
  - id: "16.1"
    category: ci-integration
    title: "GitHub Actions workflow for Claude Code present"
    definition: "anthropics/claude-code-action@v1"
    artifact: ".github/workflows/*.yml"
    detect:
      type: dir_file_count
      target: ".github/workflows"
      expected: ">0"
    confidence: HIGH
    source_url: "https://code.claude.com/docs/en/github-actions"
    importance: optional
    why_matters: "CI integration is how @claude mentions in PR comments get answered."

  - id: "16.1b"
    category: ci-integration
    title: "Workflow pins claude-code-action@v1"
    definition: "v1 GA action auto-detects interactive vs automation mode"
    artifact: ".github/workflows/*.yml"
    detect:
      type: regex_match
      target: ".github/workflows"
      expected: "anthropics/claude-code-action@v1"
    confidence: HIGH
    source_url: "https://code.claude.com/docs/en/github-actions"
    importance: recommended
    why_matters: "Older beta action uses different inputs — pinning v1 makes migration explicit."

  - id: "16.6"
    category: ci-integration
    title: "ANTHROPIC_API_KEY via GH secret, not inline"
    definition: "Never inline API keys"
    artifact: ".github/workflows/*.yml"
    detect:
      type: regex_absent
      target: ".github/workflows"
      expected: "ANTHROPIC_API_KEY:\\s*sk-"
    confidence: HIGH
    source_url: "https://code.claude.com/docs/en/github-actions"
    importance: required
    why_matters: "Inline API keys leak in git history — always use secrets."

  - id: "16.7"
    category: ci-integration
    title: "Workflow permissions block scoped"
    definition: "permissions: block grants only contents, pull-requests, issues, id-token"
    artifact: ".github/workflows/*.yml"
    detect:
      type: regex_match
      target: ".github/workflows"
      expected: "permissions:"
    confidence: HIGH
    source_url: "https://code.claude.com/docs/en/github-actions"
    importance: recommended
    why_matters: "Default GITHUB_TOKEN is over-scoped — least-privilege the workflow."

  - id: "16.9"
    category: ci-integration
    title: "Cost guardrail max-turns / timeout"
    definition: "--max-turns, workflow-level timeout, GH concurrency"
    artifact: ".github/workflows/*.yml"
    detect:
      type: regex_match
      target: ".github/workflows"
      expected: "(max-turns|timeout-minutes|concurrency)"
    confidence: HIGH
    source_url: "https://code.claude.com/docs/en/github-actions"
    importance: recommended
    why_matters: "Runaway workflows burn credits — bound them explicitly."

