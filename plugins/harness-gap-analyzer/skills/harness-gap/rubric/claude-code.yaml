gotchas:
  - id: G1
    title: "Deprecated includeCoAuthoredBy in use"
    detect:
      type: json_key_present
      target: ".claude/settings.json::includeCoAuthoredBy"
    severity: warn
    fix_hint: "Replace includeCoAuthoredBy with the current attribution key (settings.json::attribution)."

  - id: G2
    title: "Plugin subagent declares hooks/mcpServers/permissionMode (silently ignored)"
    detect:
      type: yaml_frontmatter_key
      target: "plugins/*/agents/*.md::hooks"
      expected: present
    severity: warn
    fix_hint: "Plugin subagents ignore these fields. Copy the agent file to local .claude/agents/ if you need hooks/mcpServers/permissionMode."

  - id: G3
    title: "defaultMode: auto in project or local settings (silently ignored)"
    detect:
      type: json_key_value
      target: ".claude/settings.json::permissions.defaultMode"
      expected: "auto"
    severity: error
    fix_hint: "Move defaultMode: auto to ~/.claude/settings.json — only user-scope settings honour it."

  - id: G4
    title: "Plugin assets nested inside .claude-plugin/ instead of plugin root"
    detect:
      type: dir_exists
      target: ".claude-plugin/skills"
    severity: error
    fix_hint: "Move skills/ agents/ commands/ hooks/ to plugin root. Only plugin.json belongs under .claude-plugin/."

  - id: G5
    title: "CLAUDE.md over 200 lines (adherence cliff)"
    detect:
      type: line_count_over
      target: "CLAUDE.md"
      expected: 200
    severity: warn
    fix_hint: "Split topical sections into .claude/rules/*.md with paths: globs so they only load when relevant."

  - id: G6
    title: "SKILL.md over 500 lines (violates doc guidance)"
    detect:
      type: line_count_over
      target: ".claude/skills/*/SKILL.md"
      expected: 500
    severity: warn
    fix_hint: "Move detail to sibling reference.md / examples.md files that load lazily."

  - id: G7
    title: "Skill description likely over 1,536 chars (truncated in listing)"
    detect:
      type: line_count_over
      target: ".claude/skills/*/SKILL.md"
      expected: 25
    severity: warn
    fix_hint: "Keep combined description + when_to_use under 1,536 chars; lead with the primary trigger phrase."

  - id: G8
    title: "Bash(*) / Agent broad allows used in auto-mode workflows"
    detect:
      type: regex_match
      target: ".claude/settings.json"
      expected: "Bash\\(\\*\\)|Agent\\(\\*\\)"
    severity: warn
    fix_hint: "auto mode drops these broad rules on entry. Replace with narrow Bash(npm run *) / specific Agent(name) rules."
