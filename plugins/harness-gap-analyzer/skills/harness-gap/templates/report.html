<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__HG_TITLE__</title>
<style>
  /* harness-gap report template — MIT-licensed. Self-contained: no external CSS/JS/font/image. */
  /* Design goal: GitHub README readability + plain status-report aesthetic. */

  /* Color tokens — light */
  :root {
    --bg:        #fafafa;
    --surface:   #ffffff;
    --surface-2: #f3f3f1;
    --border:    #e4e4e0;
    --text:      #1f2328;
    --text-mute: #636c76;
    --accent:    #2f6fed;
    --accent-2:  #2f6fed;
    --accent-bg: #eaf1fe;

    /* Callout palette */
    --fact:      #1f883d;   --fact-bg:   #eaf6ec;
    --hypo:      #9a6700;   --hypo-bg:   #fdf3e0;
    --unknown:   #6639ba;   --unknown-bg:#f1ebfb;
    --warn:      #cf222e;   --warn-bg:   #fdeceb;
    --note:      #2f6fed;   --note-bg:   #eaf1fe;

    --radius: 6px;
    --maxw: 860px;
    --nav-w: 230px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }

  /* Color tokens — dark */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #15171a;
      --surface:   #1c1f23;
      --surface-2: #23272c;
      --border:    #30363d;
      --text:      #e6edf3;
      --text-mute: #99a2ab;
      --accent:    #4f8bff;
      --accent-2:  #4f8bff;
      --accent-bg: #16243f;
      --fact:      #4ac26b;   --fact-bg:   #122017;
      --hypo:      #e3b341;   --hypo-bg:   #241c0c;
      --unknown:   #a371f7;   --unknown-bg:#1d1430;
      --warn:      #ff7b72;   --warn-bg:   #2a1413;
      --note:      #4f8bff;   --note-bg:   #16243f;
    }
  }

  /* Explicit theme toggle overrides OS preference */
  html[data-theme="light"] { color-scheme: light; }
  html[data-theme="dark"]  { color-scheme: dark; }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    color: var(--text);
    background: var(--bg);
    font-family: var(--sans);
    line-height: 1.7;
    font-size: 15.5px;
    -webkit-font-smoothing: antialiased;
  }

  /* Slim scroll progress bar */
  #progress {
    position: fixed; top: 0; left: 0; height: 2px; width: 0;
    background: var(--accent); z-index: 61; transition: width .1s linear;
  }

  /* Layout: left TOC + content */
  .wrap {
    display: grid;
    grid-template-columns: var(--nav-w) minmax(0, 1fr);
    gap: 0;
    max-width: calc(var(--maxw) + var(--nav-w) + 64px);
    margin: 0 auto;
  }
  nav.toc {
    position: sticky; top: 0; align-self: start; height: 100vh; overflow-y: auto;
    padding: 28px 18px; border-right: 1px solid var(--border); font-size: 13.5px;
  }
  nav.toc .toc-title {
    font-weight: 700; font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-mute); margin: 0 0 12px;
  }
  nav.toc a {
    display: block; padding: 4px 10px; margin: 1px 0; border-radius: 4px;
    color: var(--text-mute); text-decoration: none; border-left: 2px solid transparent;
    transition: color .12s ease, background-color .12s ease;
  }
  nav.toc a:hover { background: var(--surface-2); color: var(--text); }
  nav.toc a.active {
    color: var(--accent); border-left-color: var(--accent);
    background: var(--accent-bg); font-weight: 600;
  }
  nav.toc a.lvl-3 { padding-left: 22px; font-size: 12.5px; }

  main { padding: 28px 32px 120px; min-width: 0; }
  .container { max-width: var(--maxw); }

  /* Header — minimal, no gradients, no animation */
  header.doc {
    max-width: calc(var(--maxw) + var(--nav-w) + 64px);
    margin: 0 auto;
    padding: 28px 32px 18px;
    border-bottom: 1px solid var(--border);
  }
  header.doc .syslabel {
    font-family: var(--mono); font-size: 11px; color: var(--text-mute);
    letter-spacing: .08em; text-transform: uppercase;
    margin: 0 0 10px;
  }
  header.doc h1 {
    font-size: 26px; margin: 0 0 10px; line-height: 1.3;
    letter-spacing: -.01em; color: var(--text); font-weight: 700;
  }
  header.doc .meta {
    color: var(--text-mute); font-size: 12.5px; display: flex; gap: 18px;
    flex-wrap: wrap; font-family: var(--mono);
  }
  header.doc .meta span { display: inline-flex; align-items: center; gap: 5px; }
  header.doc .meta .k { color: var(--text-mute); opacity: .7; }

  /* Headings — minimal underline, no auto-counter, no gradient bar */
  h2 {
    font-size: 20px; margin: 40px 0 12px; padding: 6px 0 6px;
    scroll-margin-top: 16px;
    border-bottom: 1px solid var(--border); color: var(--text);
    font-weight: 600;
  }
  /* h2.numbered — kept as no-op for renderer back-compat */
  h2.numbered { /* no visible counter */ }

  h3 {
    font-size: 15.5px; margin: 24px 0 8px; color: var(--text);
    scroll-margin-top: 16px; font-weight: 600;
  }
  p { margin: 10px 0; }

  /* Links — subtle underline, accent color, no gradient hover */
  a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: color-mix(in srgb, var(--accent) 30%, transparent);
    text-underline-offset: 2px;
    transition: text-decoration-color .15s ease;
  }
  a:hover { text-decoration-color: var(--accent); }
  nav.toc a, header.doc a, .theme-toggle { text-decoration: none; }

  ul, ol { padding-left: 22px; } li { margin: 4px 0; }
  hr { border: 0; border-top: 1px solid var(--border); margin: 32px 0; }
  small, .mute { color: var(--text-mute); }

  /* Collapsible sections */
  details.section {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); margin: 16px 0; overflow: hidden;
    transition: border-color .15s ease;
  }
  details.section:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }
  details.section > summary {
    cursor: pointer; padding: 11px 14px; font-weight: 600; list-style: none;
    display: flex; align-items: center; gap: 9px; user-select: none;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section > summary::before {
    content: "›"; font-size: 18px; line-height: 0; color: var(--text-mute); font-weight: 700;
    transition: transform .15s ease; transform-origin: center;
  }
  details.section[open] > summary::before { transform: rotate(90deg); }
  details.section > summary:hover { background: var(--surface-2); }
  details.section .body { padding: 4px 14px 14px; border-top: 1px solid var(--border); }

  /* Callouts — 4px left accent strip, pale tint */
  .callout {
    border: 1px solid var(--border); border-left-width: 4px;
    border-radius: var(--radius); padding: 12px 14px; margin: 14px 0;
    background: var(--surface);
  }
  .callout .tag {
    font-size: 11px; font-weight: 700; letter-spacing: .04em;
    text-transform: uppercase; display: inline-flex; align-items: center;
    gap: 5px; margin-bottom: 4px;
  }
  .callout .tag::before { font-size: 13px; }
  .callout p { margin: 4px 0; }
  .callout.fact    { border-left-color: var(--fact);    background: var(--fact-bg); }
  .callout.fact .tag    { color: var(--fact); }
  .callout.fact .tag::before    { content: "✓"; }
  .callout.hypo    { border-left-color: var(--hypo);    background: var(--hypo-bg); }
  .callout.hypo .tag    { color: var(--hypo); }
  .callout.hypo .tag::before    { content: "•"; }
  .callout.unknown { border-left-color: var(--unknown); background: var(--unknown-bg); }
  .callout.unknown .tag { color: var(--unknown); }
  .callout.unknown .tag::before { content: "?"; }
  .callout.warn    { border-left-color: var(--warn);    background: var(--warn-bg); }
  .callout.warn .tag    { color: var(--warn); }
  .callout.warn .tag::before    { content: "!"; }
  .callout.note    { border-left-color: var(--note);    background: var(--note-bg); }
  .callout.note .tag    { color: var(--note); }
  .callout.note .tag::before    { content: "i"; }

  /* Badges */
  .badge {
    display: inline-block; font-size: 11px; font-weight: 700; padding: 1px 9px;
    border-radius: 999px; vertical-align: middle; line-height: 1.7;
    border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
  }
  .badge.fact    { color: var(--fact);    background: var(--fact-bg); }
  .badge.hypo    { color: var(--hypo);    background: var(--hypo-bg); }
  .badge.unknown { color: var(--unknown); background: var(--unknown-bg); }
  .badge.warn    { color: var(--warn);    background: var(--warn-bg); }
  .badge.note    { color: var(--note);    background: var(--note-bg); }

  /* Lead paragraph */
  .lead {
    font-size: 17px; line-height: 1.7; color: var(--text);
    font-weight: 400; margin: 4px 0 26px; max-width: 64ch;
  }
  .lead strong { font-weight: 650; }

  /* Pull quote */
  blockquote.pull {
    margin: 28px 0; padding: 4px 0 4px 20px;
    font-size: 18px; line-height: 1.55; font-weight: 500;
    border-left: 3px solid var(--border); color: var(--text);
  }
  blockquote.pull .src {
    display: block; margin-top: 10px; font-size: 12.5px; font-weight: 400;
    font-family: var(--mono); color: var(--text-mute);
  }
  blockquote.pull .src::before { content: "— "; }

  /* Stats grid */
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin: 20px 0;
  }
  .stats.hero { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
  .stat {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); padding: 16px 18px;
  }
  .stat .num {
    font-family: var(--mono); font-size: 30px; font-weight: 700; line-height: 1.05;
    letter-spacing: -.02em; font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .stat .num .unit { font-size: 16px; color: var(--text-mute); margin-left: 2px; }
  .stat .label {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: .05em; color: var(--text-mute); margin-top: 7px;
  }
  .stat .delta { font-size: 12px; font-weight: 700; font-family: var(--mono); margin-top: 4px; }
  .stat .delta.up   { color: var(--fact); }
  .stat .delta.up::before   { content: "▲ "; }
  .stat .delta.down { color: var(--warn); }
  .stat .delta.down::before { content: "▼ "; }
  /* Hero severity tints */
  .stats.hero .stat .num { color: var(--accent); }
  .stat.danger  .num { color: var(--warn); }
  .stat.warning .num { color: var(--hypo); }

  /* Hero verdict line */
  .hero-verdict {
    font-size: 15px; font-weight: 600; margin: 10px 0 24px;
    padding: 10px 14px; border-radius: var(--radius);
    border-left: 4px solid var(--border); background: var(--surface);
  }
  .hero-verdict.fact { color: var(--fact); border-left-color: var(--fact); background: var(--fact-bg); }
  .hero-verdict.warn { color: var(--warn); border-left-color: var(--warn); background: var(--warn-bg); }

  /* Top-action rows */
  .callout.action-row { padding: 14px 16px; }
  .callout.action-row p { margin: 6px 0; }
  .callout.action-row strong { font-size: 15px; }

  /* Tables — thin borders, mono numeric, clean rows */
  .table-scroll {
    overflow-x: auto; margin: 14px 0;
    border: 1px solid var(--border); border-radius: var(--radius);
  }
  table { border-collapse: collapse; width: 100%; font-size: 14px; }
  thead th {
    position: sticky; top: 0; background: var(--surface-2); text-align: left;
    padding: 9px 13px; font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody td { padding: 8px 13px; border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: 0; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--mono); }

  /* Inline + block code */
  code {
    font-family: var(--mono); font-size: .88em; background: var(--surface-2);
    padding: 1px 6px; border-radius: 4px;
  }
  pre {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; overflow-x: auto; font-size: 13px; line-height: 1.6;
  }
  pre code { background: none; padding: 0; }

  /* STATUS block */
  .status {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); padding: 16px 18px; margin: 24px 0;
  }
  .status h3 {
    margin: 0 0 10px; font-family: var(--mono); font-size: 12px;
    letter-spacing: .06em; color: var(--text-mute); text-transform: uppercase;
  }
  .status dl { display: grid; grid-template-columns: max-content 1fr; gap: 6px 16px; margin: 0; }
  .status dt { color: var(--text-mute); font-weight: 600; }
  .status dd { margin: 0; }
  .check { list-style: none; padding-left: 0; }
  .check li::before { content: "☐ "; color: var(--text-mute); }
  .check li.done::before { content: "☑ "; color: var(--fact); }

  /* Theme toggle — outline button, no shadow */
  .theme-toggle {
    position: fixed; top: 14px; right: 16px; z-index: 50;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    border-radius: 999px; padding: 5px 12px; font-size: 12px; cursor: pointer;
    font-family: var(--sans);
    transition: border-color .12s ease, background-color .12s ease;
  }
  .theme-toggle:hover {
    border-color: var(--accent); background: var(--accent-bg); color: var(--accent);
  }
  .theme-toggle:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  /* Focus rings */
  a:focus-visible, summary:focus-visible, button:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px;
  }

  /* Responsive: fold TOC under header */
  @media (max-width: 760px) {
    .wrap { grid-template-columns: 1fr; }
    nav.toc {
      position: static; height: auto; border-right: 0;
      border-bottom: 1px solid var(--border);
    }
    main { padding: 20px 18px 80px; }
    header.doc { padding: 22px 18px 14px; }
  }
  @media print {
    nav.toc, .theme-toggle, #progress { display: none; }
    .wrap { display: block; }
    details.section { border: 0; } details.section .body { border-top: 0; }
  }
</style>
</head>
<body>
<div id="progress"></div>
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">Theme</button>

<header class="doc">
  <p class="syslabel">// HARNESS GAP · v__HG_VERSION__</p>
  <h1>__HG_TITLE__</h1>
  <div class="meta">
    <span><span class="k">date</span> <span id="hg-meta-date">__HG_DATE__</span></span>
    <span><span class="k">scope</span> <span id="hg-meta-scope">__HG_SCOPE__</span></span>
    <span><span class="k">rubric</span> <span id="hg-meta-rubric">__HG_RUBRIC_VERSION__</span></span>
  </div>
</header>

<div class="wrap">
  <nav class="toc" aria-label="Contents">
    <div class="toc-title">Contents</div>
    <div id="toc"></div>
  </nav>

  <main>
   <div class="container">
<!-- HARNESS_GAP_CONTENT -->
</div>
  </main>
</div>

<script>
  // Build TOC + scrollspy from h2/h3 inside <main>
  (function () {
    var main = document.querySelector('main .container');
    var heads = main.querySelectorAll('h2, h3');
    var toc = document.getElementById('toc');
    var links = [];
    heads.forEach(function (h) {
      if (!h.id) h.id = h.textContent.trim().replace(/\s+/g, '-');
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      a.className = h.tagName === 'H3' ? 'lvl-3' : 'lvl-2';
      toc.appendChild(a);
      links.push({ a: a, h: h });
    });
    var spy = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          links.forEach(function (l) { l.a.classList.toggle('active', l.h === e.target); });
        }
      });
    }, { rootMargin: '0px 0px -75% 0px', threshold: 0 });
    heads.forEach(function (h) { spy.observe(h); });
  })();

  // Scroll progress bar
  (function () {
    var bar = document.getElementById('progress');
    function update() {
      var h = document.documentElement;
      var max = h.scrollHeight - h.clientHeight;
      bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';
    }
    document.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update); update();
  })();

  // Theme toggle (OS default, manual override persisted in localStorage)
  (function () {
    var btn = document.getElementById('themeToggle');
    var saved = localStorage.getItem('report-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    btn.addEventListener('click', function () {
      var cur = document.documentElement.getAttribute('data-theme');
      var isDark = cur ? cur === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      var next = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('report-theme', next);
    });
  })();
</script>
</body>
</html>
