# ---------- Fetch policy ----------
fetch_policy:
  user_agent: "harness-gap-analyzer/1.0 (+https://github.com/shurijoc/harness-gap-analyzer)"
  follow_redirects: true
  github:
    prefer: gh_api    # use `gh api repos/...` for github.com sources
    auth: gh_cli      # rely on logged-in gh; falls back to anonymous w/ rate limit
  conditional_get: true   # send If-Modified-Since / ETag, skip body on 304
  diff_strategy: content_hash   # cache_key + sha256(body); only re-summarize on hash change
  rate_limit_backoff: exponential  # anthropic.com WAF blocks bursts; space requests >=1s
