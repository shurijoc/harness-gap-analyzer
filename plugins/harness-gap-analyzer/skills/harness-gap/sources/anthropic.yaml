# Catalog of canonical Anthropic knowledge sources monitored by the
# "Claude Code best-practices gap analyzer" skill.
#
# Confidence:
#   HIGH = URL fetched and confirmed 200 OK with expected content
#   MED  = URL exists per index/blog list but specific slug returned 404 in a
#          rate-limited probe; trust the listing, treat as transient
#   LOW  = could not directly confirm; dropped unless an important spec
#
# Stability:
#   stable  = canonical product URL, expected to outlive minor reorgs
#   moving  = recently migrated (docs.claude.com -> code.claude.com /
#             platform.claude.com); set a redirect-follow on fetch
#   blog    = dated post, slug is stable but the post itself won't update
#
# Re-fetch cadence:
#   live    = each run
#   weekly  = once per 7 days
#   monthly = once per 30 days
#   yearly  = once per 365 days (blog posts that don't update)
#
# IMPORTANT: docs.claude.com 301-redirects to code.claude.com (product docs)
# and 302-redirects to platform.claude.com (API docs). Always use the
# post-redirect canonical URLs to avoid one extra hop per fetch.

